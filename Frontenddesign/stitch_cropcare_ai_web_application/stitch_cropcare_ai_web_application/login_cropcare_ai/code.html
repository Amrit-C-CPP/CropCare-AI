<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CropCare AI - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Outfit:wght@600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed": "#102000",
                        "primary-fixed": "#acf847",
                        "tertiary-fixed": "#ffd6f8",
                        "surface-container-highest": "#e0e5d2",
                        "outline-variant": "#c1cab0",
                        "surface-dim": "#d7dcca",
                        "tertiary-fixed-dim": "#ffa9fa",
                        "on-secondary-container": "#347047",
                        "surface-container-high": "#e6ead8",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#416900",
                        "secondary-fixed-dim": "#96d5a3",
                        "tertiary": "#97339a",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#91db2a",
                        "surface-variant": "#e0e5d2",
                        "on-primary": "#ffffff",
                        "background": "#f7fbe8",
                        "on-primary-fixed-variant": "#304f00",
                        "on-surface": "#181d12",
                        "on-tertiary": "#ffffff",
                        "on-secondary-fixed-variant": "#12512c",
                        "on-error": "#ffffff",
                        "surface": "#f7fbe8",
                        "secondary": "#2e6a41",
                        "on-tertiary-fixed": "#37003b",
                        "on-background": "#181d12",
                        "surface-container-low": "#f1f6e3",
                        "surface-container": "#ebf0dd",
                        "on-primary-container": "#315200",
                        "secondary-container": "#b1f2be",
                        "error": "#ba1a1a",
                        "tertiary-container": "#ff90fd",
                        "on-tertiary-fixed-variant": "#7b1480",
                        "primary-container": "#84cc16",
                        "on-secondary-fixed": "#00210d",
                        "outline": "#727a64",
                        "on-tertiary-container": "#7d1883",
                        "on-surface-variant": "#424936",
                        "inverse-surface": "#2d3226",
                        "error-container": "#ffdad6",
                        "surface-bright": "#f7fbe8",
                        "inverse-on-surface": "#eef3e0",
                        "primary-fixed-dim": "#91db2a",
                        "on-secondary": "#ffffff",
                        "surface-tint": "#416900",
                        "secondary-fixed": "#b1f2be"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-padding": "32px",
                        "section-gap": "64px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Outfit"],
                        "display-lg": ["Outfit"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Outfit"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "headline-lg-mobile": ["Outfit"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "36px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface-container-lowest font-body-md text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container">
<main class="min-h-screen flex w-full">
<!-- Left Screen: Imagery & Brand -->
<section class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-surface-variant">
<img alt="Aerial view of precision agriculture fields" class="absolute inset-0 w-full h-full object-cover scale-105 transition-transform duration-[20s] ease-out hover:scale-100" src="https://lh3.googleusercontent.com/aida/ADBb0ugMmIiKXA0LfPKaNuz4G8OufjWwLtSVqxFO6MdkCDpgnNjR5woJcrsEIMkU_f2jXUntyadG7pEyWvj76zEOkGRgdrdZob5mapDXk6ensvKb7kLruq6KF2d4tHr3cT_mQCawslBDtWsjnzKDo8aUhCAoXmOBf_9YwQZ3vK3u2H690W1KB9kIBS5OoMFuNSV2kFLT5XKM0O6M4UT73Bbu5bdhEoUFazWq5BVZ8wrnSgEcTAs-TpkjvLqTsK4"/>
<!-- Subtle Dark Gradient Overlay for readability -->
<div class="absolute inset-0 bg-gradient-to-t from-[#181d12]/80 via-[#181d12]/20 to-transparent"></div>
<div class="relative z-10 flex flex-col justify-between w-full h-full p-container-padding pb-section-gap">
<!-- Decorative top element -->
<div class="w-12 h-1 bg-primary-container rounded-full mt-8"></div>
<div class="max-w-xl mb-12">
<blockquote class="font-display-lg text-display-lg text-surface-container-lowest mb-6" style="font-family: 'Times New Roman', Times, serif; font-weight: normal; letter-spacing: normal;">
                        "Empowering growth through precision intelligence."
                    </blockquote>
<div class="flex items-center gap-3">
<div class="w-8 h-[1px] bg-primary-container"></div>
<span class="font-label-sm text-label-sm text-surface-container-highest tracking-widest uppercase">The Future of Farming</span>
</div>
</div>
</div>
</section>
<!-- Right Screen: Authentication Form -->
<section class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 lg:p-24 relative bg-surface-container-lowest">
<!-- Ambient Background Glow (Subtle) -->
<div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="w-full max-w-md relative z-10">
<!-- Header -->
<header class="mb-12 text-center lg:text-left">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary mb-2 tracking-tight">
                        CropCare AI
                    </h1>
<h2 class="font-headline-md text-headline-md text-on-surface mt-8 mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access your dashboard.</p>
</header>
<!-- Auth Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Floating Label Input: Email -->
<div class="relative group">
<input class="peer w-full h-14 px-6 pt-5 pb-2 bg-surface-container rounded-xl border border-transparent focus:border-transparent focus:ring-2 focus:ring-primary-container outline-none transition-all duration-300 font-body-md text-on-surface placeholder-transparent" id="email" placeholder="name@farm.com" required="" type="email"/>
<label class="absolute left-6 top-4 text-on-surface-variant font-body-md text-body-md transition-all duration-200 pointer-events-none peer-placeholder-shown:top-4 peer-placeholder-shown:text-body-md peer-placeholder-shown:text-on-surface-variant peer-focus:top-1.5 peer-focus:text-[11px] peer-focus:text-primary peer-valid:top-1.5 peer-valid:text-[11px] peer-valid:text-on-surface-variant" for="email">
                            Email Address
                        </label>
</div>
<!-- Floating Label Input: Password -->
<div class="relative group">
<input class="peer w-full h-14 px-6 pt-5 pb-2 bg-surface-container rounded-xl border border-transparent focus:border-transparent focus:ring-2 focus:ring-primary-container outline-none transition-all duration-300 font-body-md text-on-surface placeholder-transparent" id="password" placeholder="Password" required="" type="password"/>
<label class="absolute left-6 top-4 text-on-surface-variant font-body-md text-body-md transition-all duration-200 pointer-events-none peer-placeholder-shown:top-4 peer-placeholder-shown:text-body-md peer-placeholder-shown:text-on-surface-variant peer-focus:top-1.5 peer-focus:text-[11px] peer-focus:text-primary peer-valid:top-1.5 peer-valid:text-[11px] peer-valid:text-on-surface-variant" for="password">
                            Password
                        </label>
<!-- Optional: Eye Icon for reveal (visual only for mockup) -->
<button class="absolute right-4 top-4 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded text-primary-container focus:ring-primary-container border-outline-variant bg-surface-container-lowest transition-colors group-hover:border-primary" type="checkbox"/>
<span class="font-body-md text-body-md text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Action -->
<button class="w-full h-14 mt-4 bg-primary-container text-on-primary-container font-label-sm text-label-sm rounded-xl shadow-sm shadow-primary-container/20 hover:scale-[1.02] hover:bg-[#95e01a] transition-all duration-300 flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-8">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Authentication -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-14 bg-surface-container-lowest border border-outline-variant/50 rounded-xl hover:bg-surface-container-low hover:border-outline-variant transition-all duration-200 gap-3 font-label-sm text-label-sm text-on-surface">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Google
                    </button>
<button class="flex items-center justify-center h-14 bg-surface-container-lowest border border-outline-variant/50 rounded-xl hover:bg-surface-container-low hover:border-outline-variant transition-all duration-200 gap-3 font-label-sm text-label-sm text-on-surface">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.26.45 3.09.45.71 0 2.05-.55 3.44-.55 1.76 0 3.01.69 3.91 1.61-3.32 1.83-2.64 5.9.61 7.21-.73 1.67-1.87 3.23-3.05 4.25zM12.03 7.25C11.83 3.61 15.34 1.1 18.2 1c.28 3.84-4.04 6.32-6.17 6.25z"></path>
</svg>
                        Apple
                    </button>
</div>
<!-- Registration Link -->
<div class="mt-12 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Don't have an account yet? 
                        <a class="text-primary font-bold hover:text-primary-container transition-colors relative inline-block after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-[2px] after:bottom-0 after:left-0 after:bg-primary-container after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left" href="#">
                            Sign Up
                        </a>
</p>
</div>
</div>
</section>
</main>
</body></html>
