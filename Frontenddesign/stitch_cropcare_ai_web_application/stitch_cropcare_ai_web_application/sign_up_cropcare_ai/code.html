<!DOCTYPE html>

<title>Sign Up - CropCare AI</title>

                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "container-padding": "32px",
                        "section-gap": "64px",
                        "base": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Outfit"],
                        "display-lg": ["Outfit"],
                        "label-sm": ["Inter"],
                        "headline-md": ["Outfit"],

<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        .floating-input:focus-within label,
        .floating-input input:not(:placeholder-shown) + label {
            transform: translateY(-50%) scale(0.85);
            top: 0;
            background-color: theme('colors.surface-container-lowest');
            padding: 0 4px;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex antialiased">
<!-- Split Layout Container -->
<div class="flex w-full min-h-screen">
<!-- Left Side - Image/Branding (Hidden on mobile) -->
<div class="hidden lg:flex lg:w-1/2 relative overflow-hidden bg-surface-container">
<img alt="Precision farming landscape at sunrise" class="absolute inset-0 w-full h-full object-cover z-0" src="https://lh3.googleusercontent.com/aida/ADBb0ugMmIiKXA0LfPKaNuz4G8OufjWwLtSVqxFO6MdkCDpgnNjR5woJcrsEIMkU_f2jXUntyadG7pEyWvj76zEOkGRgdrdZob5mapDXk6ensvKb7kLruq6KF2d4tHr3cT_mQCawslBDtWsjnzKDo8aUhCAoXmOBf_9YwQZ3vK3u2H690W1KB9kIBS5OoMFuNSV2kFLT5XKM0O6M4UT73Bbu5bdhEoUFazWq5BVZ8wrnSgEcTAs-TpkjvLqTsK4"/>
<!-- Subtle dark overlay for text readability, keeping the 'High-Tech Vitality' feel -->
<div class="absolute inset-0 bg-gradient-to-t from-on-surface/80 via-on-surface/30 to-transparent z-10"></div>
<div class="relative z-20 flex flex-col justify-end p-section-gap h-full text-surface-container-lowest">
<div class="max-w-lg">
<h2 class="font-display-lg text-display-lg mb-gutter">Join a community of precision farmers.</h2>
<p class="font-body-lg text-body-lg opacity-90">Unlock data-driven insights and elevate your yield with advanced agricultural AI.</p>
</div>
</div>
</div>
<!-- Right Side - Sign Up Form -->
<div class="w-full lg:w-1/2 flex items-center justify-center p-container-padding bg-surface-container-lowest">
<div class="w-full max-w-md space-y-gutter">
<!-- Header -->
<div class="text-center mb-section-gap">
<div class="inline-flex items-center justify-center gap-2 mb-gutter">
<span class="material-symbols-outlined fill text-primary text-4xl">eco</span>
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">CropCare AI</h1>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">Create Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Start managing your farm smarter today.</p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Full Name Input -->
<div class="relative floating-input bg-surface-container-low rounded-lg border border-outline-variant/50 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all duration-300">
<input class="block w-full px-4 pt-6 pb-2 bg-transparent border-none text-on-surface focus:ring-0 peer h-14 font-body-md" id="fullName" name="fullName" placeholder=" " required="" type="text"/>
<label class="absolute text-on-surface-variant duration-300 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-4 font-body-md pointer-events-none" for="fullName">Full Name</label>
</div>
<!-- Email Input -->
<div class="relative floating-input bg-surface-container-low rounded-lg border border-outline-variant/50 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all duration-300">
<input class="block w-full px-4 pt-6 pb-2 bg-transparent border-none text-on-surface focus:ring-0 peer h-14 font-body-md" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute text-on-surface-variant duration-300 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-4 font-body-md pointer-events-none" for="email">Email Address</label>
</div>
<!-- Password Input -->
<div class="relative floating-input bg-surface-container-low rounded-lg border border-outline-variant/50 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all duration-300">
<input class="block w-full px-4 pt-6 pb-2 bg-transparent border-none text-on-surface focus:ring-0 peer h-14 font-body-md pr-12" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute text-on-surface-variant duration-300 transform -translate-y-4 scale-75 top-4 z-10 origin-[0] left-4 peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-85 peer-focus:-translate-y-4 font-body-md pointer-events-none" for="password">Password</label>
<button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex items-center">
<input class="w-4 h-4 text-primary bg-surface-container-low border-outline-variant rounded focus:ring-primary focus:ring-2" id="terms" type="checkbox"/>
<label class="ml-2 font-body-md text-body-md text-on-surface-variant" for="terms">I agree to the <a class="text-primary hover:underline font-semibold" href="#">Terms of Service</a></label>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container font-headline-md text-headline-md py-4 rounded-full hover:bg-primary hover:text-on-primary hover:scale-[1.02] transition-all duration-300 shadow-sm flex items-center justify-center gap-2 group" type="submit">
                        Create Account
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink-0 mx-4 text-on-surface-variant font-label-sm text-label-sm uppercase tracking-wider">or continue with</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg hover:bg-surface-container-low hover:shadow-sm transition-all duration-200" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label-sm text-label-sm text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 bg-surface-container-lowest border border-outline-variant rounded-lg hover:bg-surface-container-low hover:shadow-sm transition-all duration-200" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.31-.88 3.5-.8 1.54.11 2.76.71 3.45 1.83-3.12 1.87-2.62 5.92.51 7.15-.72 1.64-1.63 3.12-2.54 3.99zm-3.3-13.68c-.62 1.48-1.92 2.52-3.4 2.33-.29-1.57.51-2.97 1.25-3.79.84-.96 2.22-1.66 3.32-1.53.18 1.6-.45 2.45-1.17 2.99z"></path>
</svg>
<span class="font-label-sm text-label-sm text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Link -->
<div class="text-center mt-section-gap">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Already have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
